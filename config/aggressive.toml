# AGGRESSIVE HFT overlay — 50-100x leverage scalping.
# Designed for high-frequency scalping with AI-driven decisions.
# WARNING: High leverage = high risk. Tight SL/TP mandatory.

[mode]
run_mode = "paper"
dry_run = true
fail_closed_without_llm = true

[pairs]
symbols    = ["BTCUSDT", "ETHUSDT", "SOLUSDT"]
timeframes = ["1m", "5m", "15m"]

[strategy]
mode   = "adaptive"
active = ["mean_reversion", "ema_ribbon", "momentum", "vwap_scalp", "squeeze"]
min_ta_confidence = 60
paper_scout_enabled = true

[advanced_alpha]
# Disabled during cold-start — with < 20 trades, alpha gate causes double-penalty
# with LLM confidence scoring and creates a death spiral (loss → penalty → no trade → no recovery)
# Re-enable after bot has 50+ trades with stable win rate
enabled = false
min_abs_score = 0.15
reduce_confidence_delta = 3
feed_max_age_secs = 300

[llm]
# OpenRouter — Claude 3.5 Haiku (fast, reliable, proven for trading decisions)
# Set OPENROUTER_API_KEY in .env before running
provider = "openai"
model = "mimo-v2.5-pro"
api_base = "https://api.xiaomimimo.com/v1/chat/completions"
timeout_secs  = 30
min_confidence = 40
fallback_ta_threshold = 50
max_tokens = 2000

[manager]
enabled       = true
provider = "openai"
api_base = "https://api.xiaomimimo.com/v1/chat/completions"
model = "mimo-v2.5-pro"
timeout_secs  = 20
max_tokens = 800
fast_approve_min_conf = 55
fail_open_on_error    = true

[risk]
# High leverage HFT risk profile — tight stops, small risk per trade
risk_per_trade_pct = 2.0
max_open_positions = 6
max_daily_loss_pct = 8.0
max_drawdown_pct   = 15.0
max_leverage       = 100
max_spread_pct     = 0.08
min_reward_risk = 0.3        # 1:1 R:R minimum untuk scalping (1.2 terlalu ketat, blokir banyak signal)
min_net_edge_bps = 5.0
max_position_notional_pct = 500.0
assumed_daily_volume_usd = 1000000000000.0
equity_usd         = 100.0  # Modal kecil untuk simulasi profitable

[schedule]
# 24/7 trading — no dead zone
dead_zone_start_hour_wib = 0
dead_zone_end_hour_wib   = 0

[backtest]
slippage_bps = 1.0
market_impact_bps = 0.5

[survival]
# Stricter for high leverage — protect capital aggressively
enabled                            = true
death_line_pct                     = 0.70
loss_streak_short                  = 8
loss_streak_short_cooldown_min     = 30
loss_streak_long                   = 8
loss_streak_long_window_min        = 60
loss_streak_long_cooldown_min      = 120
daily_loss_count                   = 12
auto_flat_drawdown_pct             = 8.0
refresh_secs                       = 5
equity_refresh_secs                = 15
vol_spike_mult                     = 2.0
news_panic_threshold               = -0.7
news_euphoria_threshold            = 0.8
daily_pnl_ratchet_pct              = 3.0

[control]
telegram_commands_enabled = true
allowed_user_ids          = [7773988648]
poll_secs                 = 2

[quant]
enabled                = true
kelly_cap              = 0.20
kelly_min_trades       = 20      # Must have 20+ trades before Kelly activates (prevents negative Kelly from bad cold-start WR)
target_vol_annual      = 0.50
max_vol_multiplier     = 2.0
vol_window             = 30
var_confidence         = 0.95
max_var_pct            = 0.03
ic_window              = 30
ic_min_abs             = 0.03
ic_max_boost           = 10
kalman_process_noise   = 0.005
kalman_measurement_noise = 0.5
kalman_min_velocity_bps = 2.0
